name: Deploy Privacy Wiki to GitHub Pages

on:
  push:
    branches:
      - main        # rebuild & deploy whenever you push to main
  workflow_dispatch: # also allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-flight runs on new push
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install MkDocs and Material theme
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict

      - name: Encrypt site with StatiCrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          npm install -g staticrypt
          cd site
          find . -name "*.html" | xargs staticrypt \
            --password "$STATICRYPT_PASSWORD" \
            --directory . \
            --config false \
            --template-color-primary "#3f51b5" \
            --template-color-secondary "#5c6bc0" \
            --template-title "Privacy Wiki"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
